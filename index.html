<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harish Raju | Agile & TPM Coaching</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0f172a; /* Deep Slate */
            --secondary-color: #f8fafc; /* Light Gray/Blue */
            --accent-color: #2563eb; /* Vibrant Blue */
            --text-main: #334155;
            --text-light: #64748b;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        
        h1, h2, h3, h4 { color: var(--primary-color); font-weight: 800; line-height: 1.2; }
        a { color: var(--accent-color); text-decoration: none; transition: all 0.2s ease; }
        a:hover { color: #1d4ed8; }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .section { padding: 80px 0; }
        .bg-light { background-color: var(--secondary-color); }
        
        /* Modern Buttons with Gradients & Shadows */
        .btn { 
            display: inline-block; 
            padding: 14px 28px; 
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); 
            color: white !important; 
            border-radius: 8px; 
            font-weight: 600; 
            text-align: center; 
            border: none; 
            cursor: pointer; 
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4); 
        }
        .btn-outline { 
            background: transparent; 
            color: var(--primary-color) !important; 
            border: 2px solid #e2e8f0; 
            box-shadow: none;
        }
        .btn-outline:hover { 
            border-color: var(--primary-color); 
            transform: translateY(-2px); 
            background: transparent;
        }
        
        /* Layout Grids */
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; }
        .flex-center { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 40px; }
        
        /* Header styling */
        header { padding: 20px 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #f1f5f9; }
        header .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        nav a { margin-left: 25px; font-weight: 600; color: var(--text-main); font-size: 0.95em; }
        
        /* High-End Cards */
        .card { 
            background: white; 
            border: 1px solid #f1f5f9; 
            border-radius: 16px; 
            padding: 32px; 
            transition: all 0.3s ease; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); 
        }
        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
            border-color: #e2e8f0;
        }
        
        /* Icon Circles */
        .icon-circle {
            width: 60px;
            height: 60px;
            background: #eff6ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            margin: 0 auto 20px;
        }

        /* Hero Image Enhancement */
        .hero-img {
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.15);
            object-fit: cover;
        }

        /* Syllabus Grid */
        .syllabus-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .syllabus-item { background: white; padding: 18px; border-left: 4px solid var(--accent-color); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); font-size: 0.95em; }
    </style>
</head>
